name: Build Windows EXE

# Builds a standalone Windows .exe that needs NO .NET install on the user's PC.
# - Every push to main publishes the exe as a downloadable "artifact".
# - Pushing a version tag (e.g. v1.0.0) also creates a Release with the exe
#   attached, which is the easiest thing to hand to non-technical users.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained single-file exe
        run: >
          dotnet publish ExcelStage
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o dist

      - name: Upload exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcelStage-windows
          path: dist/ExcelStage.exe

      - name: Attach exe to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ExcelStage.exe
