name: Build Windows EXE

# Builds a standalone Windows build that needs NO .NET install on the user's PC.
# It is packaged as a ZIPPED FOLDER (not a single .exe) because the SQL Server
# networking library must sit beside the .exe as a real file - a single-file
# bundle crashes when connecting to SQL Server.
# - Every push to main publishes the zip as a downloadable "artifact".
# - Pushing a version tag (e.g. v1.0.0) also creates a Release with the zip
#   attached, which is the easiest thing to hand to non-technical users.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained build (folder)
        run: >
          dotnet publish ExcelStage
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -o publish/ExcelStage

      - name: Zip the build
        shell: pwsh
        run: Compress-Archive -Path publish/ExcelStage/* -DestinationPath ExcelStage-windows.zip -Force

      - name: Upload zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcelStage-windows
          path: ExcelStage-windows.zip

      - name: Attach zip to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ExcelStage-windows.zip
